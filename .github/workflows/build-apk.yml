name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          echo "legacy-peer-deps=true" > .npmrc
          npm install --legacy-peer-deps

      - name: Create placeholder assets
        run: |
          mkdir -p assets
          python3 << 'EOF'
          import struct
          import zlib

          def make_png(width, height, rgb=(233, 69, 96)):
              def chunk(tag, data):
                  crc = zlib.crc32(tag + data) & 0xFFFFFFFF
                  return struct.pack(">I", len(data)) + tag + data + struct.pack(">I", crc)
              sig = b"\x89PNG\r\n\x1a\n"
              ihdr = chunk(b"IHDR", struct.pack(">IIBBBBB", width, height, 8, 2, 0, 0, 0))
              row = b"\x00" + bytes(rgb) * width
              idat = chunk(b"IDAT", zlib.compress(row * height, 9))
              iend = chunk(b"IEND", b"")
              return sig + ihdr + idat + iend

          files = [
              ("assets/icon.png", 1024, 1024),
              ("assets/splash.png", 1284, 2778),
              ("assets/adaptive-icon.png", 1024, 1024),
              ("assets/favicon.png", 32, 32),
          ]
          for name, w, h in files:
              with open(name, "wb") as f:
                  f.write(make_png(w, h))
                  print(f"Created: {name}")
          print("All assets created!")
          EOF

      - name: Expo prebuild (generate Android project)
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK (release)
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
             artifacts/PlanTimer.apk || \
          cp android/app/build/outputs/apk/release/app-release.apk \
             artifacts/PlanTimer.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PlanTimer-APK
          path: artifacts/PlanTimer.apk
          retention-days: 30
