name: Build PlanTimer APK (Local Gradle Build)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Clean install dependencies
        run: |
          # Remove old node_modules and lock file
          rm -rf node_modules package-lock.json
          
          # Create .npmrc for compatibility
          echo "legacy-peer-deps=true" > .npmrc
          
          # Fresh install with Expo SDK 51
          npm install
          
          # Verify expo version
          npx expo --version

      - name: Create placeholder assets
        run: |
          mkdir -p assets
          python3 << 'EOF'
          import struct
          import zlib

          def make_png(width, height, rgb=(233, 69, 96)):
              def chunk(tag, data):
                  crc = zlib.crc32(tag + data) & 0xFFFFFFFF
                  return struct.pack(">I", len(data)) + tag + data + struct.pack(">I", crc)
              sig = b"\x89PNG\r\n\x1a\n"
              ihdr = chunk(b"IHDR", struct.pack(">IIBBBBB", width, height, 8, 2, 0, 0, 0))
              row = b"\x00" + bytes(rgb) * width
              idat = chunk(b"IDAT", zlib.compress(row * height, 9))
              iend = chunk(b"IEND", b"")
              return sig + ihdr + idat + iend

          files = [
              ("assets/icon.png", 1024, 1024),
              ("assets/splash.png", 1284, 2778),
              ("assets/adaptive-icon.png", 1024, 1024),
              ("assets/favicon.png", 32, 32),
              ("assets/notification-icon.png", 96, 96),
          ]
          for name, w, h in files:
              with open(name, "wb") as f:
                  f.write(make_png(w, h))
                  print(f"Created: {name}")
          print("All assets created successfully!")
          EOF

      - name: Generate Android project with Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Setup native Android module
        run: |
          echo "Setting up native PlanTimer module..."
          
          # Find the package directory structure
          PKG_DIR=$(find android/app/src/main/java -type d -name "plantimer" 2>/dev/null | head -1)
          
          if [ -z "$PKG_DIR" ]; then
            echo "Creating package structure..."
            mkdir -p android/app/src/main/java/com/plantimer/app/modules
            PKG_DIR="android/app/src/main/java/com/plantimer/app"
          fi
          
          MODULES_DIR="$PKG_DIR/modules"
          mkdir -p "$MODULES_DIR"
          
          # Create the native module Kotlin file using printf for proper formatting
          printf '%s\n' 'package com.plantimer.app.modules' > "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' 'import android.app.Activity' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' 'import android.app.KeyguardManager' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' 'import android.content.Context' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' 'import android.content.Intent' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' 'import android.net.Uri' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' 'import android.os.Build' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' 'import android.os.PowerManager' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' 'import android.view.WindowManager' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' 'import expo.modules.kotlin.modules.Module' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' 'import expo.modules.kotlin.modules.ModuleDefinition' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' 'import expo.modules.kotlin.Promise' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' 'class PlanTimerModule : Module() {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '    override fun definition() = ModuleDefinition {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        Name("PlanTimer")' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        Function("wakeupAndUnlock") { promise: Promise ->' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            try {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                wakeupAndUnlockInternal()' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                promise.resolve(true)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            } catch (e: Exception) {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                promise.reject("WAKEUP_ERROR", e.message, e)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        Function("openApp") { packageName: String, promise: Promise ->' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            try {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                val result = openAppInternal(packageName)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                promise.resolve(result)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            } catch (e: Exception) {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                promise.reject("OPEN_APP_ERROR", e.message, e)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        Function("isDeviceLocked") { promise: Promise ->' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            try {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                val locked = isDeviceLockedInternal()' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                promise.resolve(locked)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            } catch (e: Exception) {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                promise.reject("LOCK_CHECK_ERROR", e.message, e)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        Function("isBatteryOptimizationEnabled") { promise: Promise ->' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            try {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                val enabled = isBatteryOptimizationEnabledInternal()' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                promise.resolve(enabled)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            } catch (e: Exception) {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                promise.reject("BATTERY_OPT_ERROR", e.message, e)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '    }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '    private var wakeLock: PowerManager.WakeLock? = null' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '    private val context: Context' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        get() = appContext.reactContext ?: throw Exception("React context not available")' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '    private val currentActivity: Activity?' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        get() = appContext.currentActivity' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '    private fun wakeupAndUnlockInternal() {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        val powerManager = context.getSystemService(Context.POWER_SERVICE) as PowerManager' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        val keyguardManager = context.getSystemService(Context.KEYGUARD_SERVICE) as KeyguardManager' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        wakeLock = powerManager.newWakeLock(' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            PowerManager.FULL_WAKE_LOCK or PowerManager.ACQUIRE_CAUSES_WAKEUP or PowerManager.ON_AFTER_RELEASE,' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            "PlanTimer::WakeLock"' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        )' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        wakeLock?.acquire(30000)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        val activity = currentActivity' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        activity?.runOnUiThread {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                activity.setShowWhenLocked(true)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                activity.setTurnScreenOn(true)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            } else {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                @Suppress("DEPRECATION")' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                activity.window?.addFlags(' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                    WindowManager.LayoutParams.FLAG_SHOW_WHEN_LOCKED or' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                    WindowManager.LayoutParams.FLAG_TURN_SCREEN_ON' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                )' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                keyguardManager.requestDismissKeyguard(activity, null)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '    }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '    private fun openAppInternal(packageName: String): Boolean {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        return try {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            val pm = context.packageManager' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            val intent = pm.getLaunchIntentForPackage(packageName)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            if (intent != null) {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK or Intent.FLAG_ACTIVITY_CLEAR_TOP)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                context.startActivity(intent)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                true' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            } else {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                val marketIntent = Intent(Intent.ACTION_VIEW, Uri.parse("market://details?id=$packageName"))' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                marketIntent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                if (marketIntent.resolveActivity(pm) != null) {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                    context.startActivity(marketIntent)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                    true' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                } else {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                    false' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '                }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        } catch (e: Exception) {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            false' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '    }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '    private fun isDeviceLockedInternal(): Boolean {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        val keyguardManager = context.getSystemService(Context.KEYGUARD_SERVICE) as KeyguardManager' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        return keyguardManager.isKeyguardLocked' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '    }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '    private fun isBatteryOptimizationEnabledInternal(): Boolean {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        return if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            val powerManager = context.getSystemService(Context.POWER_SERVICE) as PowerManager' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            !powerManager.isIgnoringBatteryOptimizations(context.packageName)' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        } else {' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '            false' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '        }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '    }' >> "$MODULES_DIR/PlanTimerModule.kt"
          printf '%s\n' '}' >> "$MODULES_DIR/PlanTimerModule.kt"
          
          echo "Native module created at: $MODULES_DIR/PlanTimerModule.kt"
          cat "$MODULES_DIR/PlanTimerModule.kt"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi
        working-directory: android

      - name: Sign and package APK
        run: |
          mkdir -p artifacts
          
          # Determine source APK based on build type
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            SOURCE_APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
            OUTPUT_NAME="PlanTimer-release"
          else
            SOURCE_APK="android/app/build/outputs/apk/debug/app-debug.apk"
            OUTPUT_NAME="PlanTimer-debug"
          fi
          
          if [ -f "$SOURCE_APK" ]; then
            # For debug builds, use debug signing
            if [ "${{ github.event.inputs.build_type }}" != "release" ]; then
              cp "$SOURCE_APK" "artifacts/${OUTPUT_NAME}.apk"
              echo "Debug APK packaged (already signed with debug key)"
            else
              # Create debug keystore for release signing (or use your own in secrets)
              keytool -genkey -v \
                -keystore debug.keystore \
                -storepass android \
                -alias androiddebugkey \
                -keypass android \
                -keyalg RSA \
                -keysize 2048 \
                -validity 10000 \
                -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null
              
              # Sign the APK
              $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
                --ks debug.keystore \
                --ks-pass pass:android \
                --key-pass pass:android \
                --in "$SOURCE_APK" \
                --out "artifacts/${OUTPUT_NAME}.apk" 2>/dev/null || \
              cp "$SOURCE_APK" "artifacts/${OUTPUT_NAME}-unsigned.apk"
            fi
            
            echo "APK created: artifacts/${OUTPUT_NAME}.apk"
            ls -lh artifacts/
          else
            echo "ERROR: APK not found at $SOURCE_APK"
            echo "Searching for APK files..."
            find android -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlanTimer-APK-${{ github.run_number }}
          path: artifacts/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: PlanTimer v${{ github.run_number }}
          body: |
            ## PlanTimer APK Build ${{ github.run_number }}
            
            ### Informatie
            - Build type: ${{ github.event.inputs.build_type || 'debug' }}
            - Commit: ${{ github.sha }}
            - Datum: ${{ github.event.head_commit.timestamp }}
            
            ### Functionaliteiten
            - Timer/Alarm planning
            - Automatisch wake-up en unlock
            - Automatisch openen van doel-app
            - Batterij optimalisatie checks
            
            ### Installatie
            1. Download de APK
            2. Zet "Onbekende bronnen" aan in Android instellingen
            3. Installeer de APK
            4. Geef alle gevraagde permissies
          files: artifacts/*.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "========================================="
          echo "  PlanTimer APK Build Complete!"
          echo "========================================="
          echo "Build Type: ${{ github.event.inputs.build_type || 'debug' }}"
          echo "Artifacts:"
          ls -lh artifacts/ 2>/dev/null || echo "No artifacts directory"
          echo ""
          echo "Download the APK from the 'Artifacts' section above"
